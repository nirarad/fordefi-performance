[pytest]
addopts =
    --html=reports/report.html
    --self-contained-html
    --tb=short
testpaths = tests
markers =
    performance: performance tests measuring load times and responsiveness
    smoke: quick sanity checks before a full performance run
    baseline: establish baseline performance metrics
    stress: high-load or repeated-request stress tests
    slow: tests expected to take longer due to measurement sampling
